services:
  api:
    build:
      context: .
      target: backend
    container_name: dailypaper-api
    ports:
      - "8021:8021"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MONGODB_URL=mongodb://host.docker.internal:27017
      - MONGODB_DB_NAME=dailypaper
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - UPLOAD_DIR=/app/uploads
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend
    container_name: dailypaper-frontend
    ports:
      - "8098:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  uploads:
